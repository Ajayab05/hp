name: Deploy to EKS

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Configure AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 4. Set variables
      - name: Set variables
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_URL=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 5. Build & Push Docker Images
      - name: Build & Push Images
        run: |
          services=("order-service" "payment-service" "uiservices")

          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build -t $ECR_URL/$service:$IMAGE_TAG ./$service
            docker push $ECR_URL/$service:$IMAGE_TAG
          done

      # 6. Update kubeconfig for EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name your-cluster-name

      # 7. Deploy to EKS (kubectl apply)
      - name: Deploy to EKS
        run: |
          kubectl set image deployment/order-service order-service=$ECR_URL/order-service:$IMAGE_TAG
          kubectl set image deployment/payment-service payment-service=$ECR_URL/payment-service:$IMAGE_TAG
          kubectl set image deployment/ui-service ui-service=$ECR_URL/ui-service:$IMAGE_TAG
