name: Deploy to EKS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set variables
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_URL=$ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build & Push Images
        run: |
          docker build -t $ECR_URL/order-service:$IMAGE_TAG .
          docker push $ECR_URL/order-service:$IMAGE_TAG .

          docker build -t $ECR_URL/payment-service:$IMAGE_TAG .
          docker push $ECR_URL/payment-service:$IMAGE_TAG

          docker build -t $ECR_URL/uiservice:$IMAGE_TAG .
          docker push $ECR_URL/uiservice:$IMAGE_TAG .
